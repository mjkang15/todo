name: Deploy TODO to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: config.js 생성 (Secrets → 파일)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          printf 'const db = window.supabase.createClient("%s", "%s");\n' \
            "$SUPABASE_URL" "$SUPABASE_ANON_KEY" > config.js

      - name: GitHub Pages 아티팩트 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: GitHub Pages 배포
        id: deploy
        uses: actions/deploy-pages@v4
