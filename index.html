<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TODO LIST</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- 인증 오버레이 -->
  <div id="auth-overlay">
    <div class="auth-card">
      <div class="auth-header">
        <span class="material-icons" style="font-size:3rem;color:var(--primary)">task_alt</span>
        <h1 style="font-size:1.5rem;font-weight:500;color:var(--primary);letter-spacing:2px;margin-top:8px">TODO LIST</h1>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login" type="button">로그인</button>
        <button class="auth-tab" id="tab-signup" type="button">회원가입</button>
      </div>

      <div id="auth-message" class="auth-message" style="display:none"></div>

      <form id="auth-form">
        <div class="auth-field">
          <input type="email" id="auth-email" placeholder=" " autocomplete="email" required />
          <label for="auth-email">이메일</label>
        </div>
        <div class="auth-field">
          <input type="password" id="auth-password" placeholder=" " autocomplete="current-password" required minlength="6" />
          <label for="auth-password">비밀번호 (6자 이상)</label>
        </div>
        <button type="submit" class="btn-filled auth-submit" id="auth-submit-btn">로그인</button>
      </form>

      <div class="auth-divider"><span>또는</span></div>

      <div class="social-btns">
        <button type="button" class="btn-social" id="btn-google">
          <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/><path fill="#FBBC05" d="M3.964 10.707c-.18-.54-.282-1.117-.282-1.707s.102-1.167.282-1.707V4.961H.957C.347 6.175 0 7.548 0 9s.348 2.825.957 4.039l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.961L3.964 7.293C4.672 5.166 6.656 3.58 9 3.58z"/></svg>
          Google로 계속하기
        </button>
        <button type="button" class="btn-social" id="btn-github">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0112 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/></svg>
          GitHub으로 계속하기
        </button>
      </div>
    </div>
  </div>

  <!-- 모바일 앱바 -->
  <header class="app-bar">
    <span class="material-icons app-bar-icon">task_alt</span>
    <span class="app-bar-title">TODO LIST</span>
    <div class="app-bar-user" id="app-bar-user" style="display:none">
      <span class="app-bar-email" id="app-bar-email"></span>
      <button class="icon-btn app-bar-logout" id="logout-btn-mobile" title="로그아웃">
        <span class="material-icons">logout</span>
      </button>
    </div>
  </header>

  <main class="main">
    <div class="container">

      <!-- 데스크탑 사용자 바 -->
      <div class="desktop-user-bar" id="desktop-user-bar">
        <span class="material-icons" style="font-size:1rem">account_circle</span>
        <span id="desktop-user-email" class="desktop-user-email"></span>
        <button class="btn-text" id="logout-btn-desktop">로그아웃</button>
      </div>

      <!-- 데스크탑 타이틀 -->
      <h1 class="page-title">TODO LIST</h1>

      <!-- 검색 -->
      <div class="search-wrap">
        <span class="material-icons search-icon">search</span>
        <input class="search-input" id="search-input" placeholder="검색..." />
      </div>

      <!-- 입력 카드 -->
      <div class="card input-card">
        <div class="input-row">
          <div class="text-field">
            <input type="text" id="todo-input" placeholder=" " autocomplete="off" />
            <label for="todo-input">할 일을 입력하세요</label>
          </div>
          <button id="add-btn" class="btn-filled">
            <span class="material-icons">add</span>
            <span class="btn-label">추가</span>
          </button>
        </div>
        <div class="options-row">
          <select id="priority-select" class="select-field">
            <option value="high">🔴 높음</option>
            <option value="medium" selected>🟡 보통</option>
            <option value="low">🔵 낮음</option>
          </select>
          <select id="category-select" class="select-field">
            <option value="work">💼 업무</option>
            <option value="personal" selected>👤 개인</option>
            <option value="study">📚 공부</option>
            <option value="other">📌 기타</option>
          </select>
          <input type="date" id="due-date-input" class="date-field" />
        </div>
      </div>

      <!-- 필터 칩 -->
      <div class="chip-row" id="status-tabs">
        <button class="filter-chip active" data-filter="all">전체</button>
        <button class="filter-chip" data-filter="active">진행중</button>
        <button class="filter-chip" data-filter="done">완료</button>
      </div>
      <div class="chip-row" id="category-tabs">
        <button class="filter-chip active" data-category="all">전체</button>
        <button class="filter-chip" data-category="work">💼 업무</button>
        <button class="filter-chip" data-category="personal">👤 개인</button>
        <button class="filter-chip" data-category="study">📚 공부</button>
        <button class="filter-chip" data-category="other">📌 기타</button>
      </div>

      <!-- 할 일 목록 -->
      <ul id="todo-list"></ul>

      <!-- 푸터 -->
      <div class="footer">
        <span id="remaining" class="remaining-text">남은 할 일: 0개</span>
        <button id="clear-btn" class="btn-text">완료 삭제</button>
      </div>

    </div>
  </main>

  <!-- FAB (모바일) -->
  <button class="fab" id="fab-btn" aria-label="할 일 추가">
    <span class="material-icons">add</span>
  </button>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
